<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hive</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      #cth-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        background: #FAFAFA; color: #1B1F24;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
      #cth-splash .mk {
        display: grid; place-items: center; width: 56px; height: 56px;
        background: #6366F1; color: #FFFFFF; border-radius: 12px;
        font-family: "Inter", system-ui, sans-serif; font-weight: 700; font-size: 20px; letter-spacing: -1px;
        box-shadow: 0 4px 12px rgba(99,102,241,0.30);
      }
      #cth-splash .title { font-family: "Inter", system-ui, sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.5px; }
      #cth-splash .hint { font-size: 13px; color: #6B727B; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="cth-splash">
        <div class="mk">H</div>
        <div class="title">HIVE</div>
        <div class="hint">booting the hive…</div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
