name: Build blog

# Rebuilds the Eleventy blog into docs/blog whenever the blog source changes,
# and commits the generated output. The site itself is served by the existing
# GitHub Pages "deploy from branch" setup (docs/ + CNAME) — this workflow only
# regenerates the static files under docs/blog, it does NOT change Pages config.
#
# Trigger is scoped to blog/** so the commit it makes (under docs/blog) never
# re-triggers the workflow. Safe to run manually via workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - "blog/**"
      - ".github/workflows/blog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install + build blog
        working-directory: blog
        run: |
          npm ci
          npm run build

      - name: Commit regenerated blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/blog)" ]; then
            git add docs/blog
            git commit -m "chore(blog): rebuild static output [skip ci]"
            git push
          else
            echo "No blog changes to commit."
          fi
